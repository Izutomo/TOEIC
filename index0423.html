<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英単語学習アプリ</title>

<style>
:root {
  --bg: #f3f6fb;
  --card: #ffffff;
  --line: #d9e2f1;
  --text: #1d2a3a;
  --sub: #5f6f82;
  --accent: #2f6fed;
  --accent-soft: #eaf1ff;
  --ok: #15803d;
  --ng: #c2410c;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(180deg, #eef4ff 0%, #f7f9fc 100%);
  color: var(--text);
  min-height: 100vh;
}

.wrapper {
  width: min(920px, calc(100% - 32px));
  margin: 24px auto;
}

.card {
  background: var(--card);
  border-radius: 18px;
  padding: 24px;
  box-shadow: 0 12px 30px rgba(31, 41, 55, 0.08);
  border: 1px solid rgba(217, 226, 241, 0.9);
}

h1, h2, h3, p {
  margin-top: 0;
}

.hero {
  margin-bottom: 18px;
}

.hero p {
  color: var(--sub);
  margin-bottom: 0;
}

.section {
  margin-top: 22px;
}

.label {
  display: block;
  font-size: 14px;
  font-weight: bold;
  color: var(--sub);
  margin-bottom: 10px;
}

.schedule-grid,
.page-grid {
  display: grid;
  gap: 10px;
}

.schedule-grid {
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
}

.page-grid {
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
}

.option-card {
  border: 1px solid var(--line);
  background: #fff;
  border-radius: 14px;
  padding: 14px;
  cursor: pointer;
  transition: 0.2s ease;
}

.option-card:hover {
  border-color: var(--accent);
  transform: translateY(-1px);
}

.option-card.selected {
  border-color: var(--accent);
  background: var(--accent-soft);
}

.option-card input {
  margin-right: 8px;
}

.option-title {
  font-weight: bold;
  margin-bottom: 4px;
}

.option-sub {
  font-size: 13px;
  color: var(--sub);
}

.button-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 18px;
}

button {
  appearance: none;
  border: none;
  border-radius: 12px;
  padding: 12px 16px;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
}

.primary {
  background: var(--accent);
  color: white;
}

.secondary {
  background: #eef2f7;
  color: var(--text);
}

.ghost {
  background: white;
  border: 1px solid var(--line);
  color: var(--text);
}

button:disabled {
  opacity: 0.45;
  cursor: not-allowed;
}

.summary {
  margin-top: 14px;
  padding: 14px;
  border-radius: 12px;
  background: #f8fbff;
  border: 1px solid var(--line);
  color: var(--sub);
  line-height: 1.7;
}

.hidden {
  display: none;
}

.study-header {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: flex-start;
  flex-wrap: wrap;
}

.badge {
  display: inline-block;
  padding: 6px 10px;
  background: var(--accent-soft);
  color: var(--accent);
  border-radius: 999px;
  font-size: 12px;
  font-weight: bold;
  margin-bottom: 10px;
}

.question-box {
  margin-top: 18px;
  padding: 20px;
  border-radius: 16px;
  background: #f9fbff;
  border: 1px solid var(--line);
}

#question {
  font-size: 24px;
  line-height: 1.6;
  margin-bottom: 16px;
}

#answer {
  width: 100%;
  padding: 14px;
  font-size: 16px;
  border-radius: 12px;
  border: 1px solid var(--line);
  margin-bottom: 12px;
}

.meta {
  margin-top: 12px;
  color: var(--sub);
  font-size: 14px;
}

#result {
  min-height: 24px;
  font-weight: bold;
  margin-top: 10px;
}

#result.ok {
  color: var(--ok);
}

#result.ng {
  color: var(--ng);
}

.footer-actions {
  margin-top: 18px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.empty {
  color: var(--sub);
  padding: 20px;
  text-align: center;
  border: 1px dashed var(--line);
  border-radius: 12px;
  background: #fcfdff;
}

@media (max-width: 640px) {
  .wrapper {
    width: calc(100% - 20px);
    margin: 10px auto 24px;
  }

  .card {
    padding: 18px;
  }

  #question {
    font-size: 20px;
  }

  button {
    width: 100%;
  }
}
</style>
</head>
<body>
<div class="wrapper">
  <div id="selectionView" class="card">
    <div class="hero">
      <h1>英単語学習</h1>
      <p>学習する日程とページ範囲を選んで、選んだ単語だけで穴埋め学習できます。</p>
    </div>

    <div class="section">
      <span class="label">1. テストの日程を選択</span>
      <div id="scheduleList" class="schedule-grid"></div>
    </div>

    <div class="section">
      <span class="label">2. 学習範囲を選択（複数選択可）</span>
      <div id="pageRangeList" class="page-grid"></div>
    </div>

    <div id="selectionSummary" class="summary">
      日程とページ範囲を選択してください。
    </div>

    <div class="button-row">
      <button id="startButton" class="primary" disabled>この範囲で学習開始</button>
      <button id="showListButton" class="secondary" disabled>選択範囲の単語一覧を見る</button>
    </div>
  </div>

  <div id="studyView" class="card hidden">
    <div class="study-header">
      <div>
        <div class="badge" id="studyTarget">選択範囲</div>
        <h2>穴埋め学習</h2>
      </div>
      <div class="meta">
        <div id="progress"></div>
        <div id="score"></div>
      </div>
    </div>

    <div class="question-box">
      <h3 id="question">Loading...</h3>
      <input type="text" id="answer" placeholder="答えを入力">
      <button class="primary" onclick="checkAnswer()">回答</button>
      <p id="result"></p>
    </div>

    <div class="footer-actions">
      <button class="ghost" onclick="toggleMode()">よく間違える問題モード</button>
      <button class="secondary" onclick="backToSelection()">範囲選択に戻る</button>
      <button class="ghost" onclick="openSelectedList()">選択範囲の一覧を見る</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = "vocabSelectionState";
const PAGE_BLOCK_SIZE = 13;
const START_PAGE = 16;

const schedules = [
  { id: "2026-04-23", label: "4/23 単語学習", ranges: "all" }
];

let allWords = [];
let pageRanges = [];
let selectedScheduleId = "";
let selectedRangeIds = [];
let selectedWords = [];

let currentList = [];
let index = 0;
let correct = 0;
let hardMode = false;

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function parseData(data) {
  return data
    .trim()
    .split("\n")
    .filter(line => line.trim())
    .map((line, idx) => {
      const parts = line.split(",");
      const answer = parts.pop().trim();
      const question = parts.join(",").trim();
      return {
        id: idx,
        q: question,
        a: answer,
        wrongCount: 0,
        marked: false
      };
    });
}

function buildPageRanges(words) {
  const ranges = [];
  for (let start = 0; start < words.length; start += PAGE_BLOCK_SIZE) {
    const end = Math.min(start + PAGE_BLOCK_SIZE, words.length);
    const startPage = START_PAGE + ranges.length * 2;
    ranges.push({
      id: `range-${ranges.length + 1}`,
      label: `P${startPage}&P${startPage + 1}`,
      start,
      end
    });
  }
  return ranges;
}

function renderSchedules() {
  const container = document.getElementById("scheduleList");
  container.innerHTML = "";

  schedules.forEach(schedule => {
    const card = document.createElement("label");
    card.className = "option-card" + (selectedScheduleId === schedule.id ? " selected" : "");
    card.innerHTML = `
      <div class="option-title">
        <input type="radio" name="schedule" value="${schedule.id}" ${selectedScheduleId === schedule.id ? "checked" : ""}>
        ${schedule.label}
      </div>
      <div class="option-sub">対象範囲から学習内容を選べます</div>
    `;
    card.querySelector("input").addEventListener("change", () => {
      selectedScheduleId = schedule.id;
      selectedRangeIds = [];
      saveSelectionOnly();
      renderSchedules();
      renderPageRanges();
      updateSelectionSummary();
    });
    container.appendChild(card);
  });
}

function renderPageRanges() {
  const container = document.getElementById("pageRangeList");
  container.innerHTML = "";

  if (!selectedScheduleId) {
    container.innerHTML = '<div class="empty">先に日程を選択してください。</div>';
    updateSelectionSummary();
    return;
  }

  pageRanges.forEach(range => {
    const checked = selectedRangeIds.includes(range.id);
    const count = range.end - range.start;
    const card = document.createElement("label");
    card.className = "option-card" + (checked ? " selected" : "");
    card.innerHTML = `
      <div class="option-title">
        <input type="checkbox" value="${range.id}" ${checked ? "checked" : ""}>
        ${range.label}
      </div>
      <div class="option-sub">${count} 問</div>
    `;

    card.querySelector("input").addEventListener("change", (event) => {
      if (event.target.checked) {
        selectedRangeIds.push(range.id);
      } else {
        selectedRangeIds = selectedRangeIds.filter(id => id !== range.id);
      }
      saveSelectionOnly();
      renderPageRanges();
      updateSelectionSummary();
    });

    container.appendChild(card);
  });

  updateSelectionSummary();
}

function getSelectedSchedule() {
  return schedules.find(schedule => schedule.id === selectedScheduleId);
}

function getSelectedRanges() {
  return pageRanges.filter(range => selectedRangeIds.includes(range.id));
}

function buildSelectedWords() {
  const ranges = getSelectedRanges();
  const words = [];
  ranges.forEach(range => {
    words.push(...allWords.slice(range.start, range.end));
  });
  return words.map(word => ({ ...word }));
}

function updateSelectionSummary() {
  const summary = document.getElementById("selectionSummary");
  const startButton = document.getElementById("startButton");
  const listButton = document.getElementById("showListButton");

  const schedule = getSelectedSchedule();
  const ranges = getSelectedRanges();

  if (!schedule) {
    summary.innerHTML = "日程を選択してください。";
    startButton.disabled = true;
    listButton.disabled = true;
    return;
  }

  if (!ranges.length) {
    summary.innerHTML = `${schedule.label} を選択中です。続けて学習範囲を選んでください。`;
    startButton.disabled = true;
    listButton.disabled = true;
    return;
  }

  const count = ranges.reduce((sum, range) => sum + (range.end - range.start), 0);
  summary.innerHTML = `
    <strong>${schedule.label}</strong><br>
    範囲: ${ranges.map(range => range.label).join(", ")}<br>
    出題数: ${count} 問
  `;
  startButton.disabled = false;
  listButton.disabled = false;
}

function rebuildList() {
  if (hardMode) {
    currentList = selectedWords.filter(word => word.wrongCount >= 3);
  } else {
    currentList = [...selectedWords];
  }
  shuffle(currentList);
  index = 0;
}

function showQuestion() {
  const questionEl = document.getElementById("question");
  const resultEl = document.getElementById("result");

  if (!currentList.length) {
    questionEl.innerText = hardMode
      ? "よく間違えた問題がまだありません"
      : "問題がありません";
    document.getElementById("progress").innerText = "0 / 0";
    document.getElementById("score").innerText = `正解数: ${correct}`;
    resultEl.innerText = "";
    resultEl.className = "";
    return;
  }

  if (index >= currentList.length) {
    questionEl.innerText = "終了！";
    document.getElementById("progress").innerText = `${currentList.length} / ${currentList.length}`;
    document.getElementById("score").innerText = `正解数: ${correct}`;
    resultEl.innerText = "もう一度学習するには範囲選択に戻ってください。";
    resultEl.className = "ok";
    return;
  }

  questionEl.innerText = currentList[index].q;
  document.getElementById("answer").value = "";
  document.getElementById("answer").focus();
  document.getElementById("progress").innerText = `${index + 1} / ${currentList.length}`;
  document.getElementById("score").innerText = `正解数: ${correct}`;
  resultEl.innerText = "";
  resultEl.className = "";
}

function checkAnswer() {
  const input = document.getElementById("answer").value.trim();
  const result = document.getElementById("result");
  const current = currentList[index];

  if (!current) return;

  if (input === current.a) {
    result.innerText = "正解！";
    result.className = "ok";
    correct++;
    current.marked = false;

    const original = selectedWords.find(word => word.id === current.id);
    if (original) {
      original.marked = false;
    }

    index++;
  } else {
    result.innerText = `不正解: ${current.a}`;
    result.className = "ng";
    current.marked = true;
    current.wrongCount++;

    const original = selectedWords.find(word => word.id === current.id);
    if (original) {
      original.marked = true;
      original.wrongCount = current.wrongCount;
    }
  }

  saveFullState();
  setTimeout(showQuestion, 800);
}

function toggleMode() {
  hardMode = !hardMode;
  document.getElementById("result").innerText = hardMode
    ? "よく間違える問題モード"
    : "通常モード";
  document.getElementById("result").className = hardMode ? "ok" : "";
  rebuildList();
  showQuestion();
  saveFullState();
}

function startStudy() {
  selectedWords = buildSelectedWords();
  if (!selectedWords.length) return;

  shuffle(selectedWords);
  correct = 0;
  index = 0;
  hardMode = false;

  const schedule = getSelectedSchedule();
  const ranges = getSelectedRanges();
  document.getElementById("studyTarget").innerText =
    `${schedule.label} / ${ranges.map(range => range.label).join(", ")}`;

  rebuildList();
  document.getElementById("selectionView").classList.add("hidden");
  document.getElementById("studyView").classList.remove("hidden");
  saveFullState();
  showQuestion();
}

function backToSelection() {
  document.getElementById("studyView").classList.add("hidden");
  document.getElementById("selectionView").classList.remove("hidden");
  saveFullState();
}

function openSelectedList() {
  const params = new URLSearchParams();
  params.set("schedule", selectedScheduleId);
  params.set("ranges", selectedRangeIds.join("|"));
  location.href = `list0423.html?${params.toString()}`;
}

function saveSelectionOnly() {
  const state = loadState();
  const next = {
    ...state,
    selectedScheduleId,
    selectedRangeIds
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
}

function saveFullState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    selectedScheduleId,
    selectedRangeIds,
    selectedWords,
    correct,
    hardMode,
    studyOpened: !document.getElementById("studyView").classList.contains("hidden")
  }));
}

function loadState() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
  } catch {
    return {};
  }
}

function restoreState() {
  const state = loadState();
  selectedScheduleId = state.selectedScheduleId || "";
  selectedRangeIds = Array.isArray(state.selectedRangeIds) ? state.selectedRangeIds : [];

  if (Array.isArray(state.selectedWords) && state.selectedWords.length) {
    selectedWords = state.selectedWords;
    correct = state.correct || 0;
    hardMode = !!state.hardMode;

    const schedule = getSelectedSchedule();
    const ranges = getSelectedRanges();
    if (schedule && ranges.length && state.studyOpened) {
      document.getElementById("studyTarget").innerText =
        `${schedule.label} / ${ranges.map(range => range.label).join(", ")}`;
      document.getElementById("selectionView").classList.add("hidden");
      document.getElementById("studyView").classList.remove("hidden");
      rebuildList();
      showQuestion();
    }
  }
}

document.getElementById("startButton").addEventListener("click", startStudy);
document.getElementById("showListButton").addEventListener("click", openSelectedList);
document.getElementById("answer").addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    checkAnswer();
  }
});

fetch("data.txt?v=" + Date.now())
  .then(res => res.text())
  .then(text => {
    allWords = parseData(text);
    pageRanges = buildPageRanges(allWords);
    restoreState();
    renderSchedules();
    renderPageRanges();
    updateSelectionSummary();
  });
</script>
</body>
</html>
