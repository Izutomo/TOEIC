<!DOCTYPE html>
<html lang="ja">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英単語学習アプリ</title>

<style>
:root {
  --card: #ffffff;
  --line: #d9e2f1;
  --text: #1d2a3a;
  --sub: #5f6f82;
  --accent: #2f6fed;
  --accent-soft: #eaf1ff;
  --ok: #15803d;
  --ng: #c2410c;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(180deg, #eef4ff 0%, #f7f9fc 100%);
  color: var(--text);
  min-height: 100vh;
}

.wrapper {
  width: min(920px, calc(100% - 32px));
  margin: 24px auto;
}

.card {
  background: var(--card);
  border-radius: 18px;
  padding: 24px;
  box-shadow: 0 12px 30px rgba(31, 41, 55, 0.08);
  border: 1px solid rgba(217, 226, 241, 0.9);
}

h1, h2, h3, p {
  margin-top: 0;
}

.hero {
  margin-bottom: 18px;
}

.hero p {
  color: var(--sub);
  margin-bottom: 0;
}

.section {
  margin-top: 22px;
}

.label {
  display: block;
  font-size: 14px;
  font-weight: bold;
  color: var(--sub);
  margin-bottom: 10px;
}

.schedule-grid,
.page-grid {
  display: grid;
  gap: 10px;
}

.schedule-grid {
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
}

.page-grid {
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
}

.option-card {
  border: 1px solid var(--line);
  background: #fff;
  border-radius: 14px;
  padding: 14px;
  cursor: pointer;
  transition: 0.2s ease;
}

.option-card:hover {
  border-color: var(--accent);
  transform: translateY(-1px);
}

.option-card.selected {
  border-color: var(--accent);
  background: var(--accent-soft);
}

.option-card.disabled {
  background: #f3f4f6;
  border-color: #e5e7eb;
  color: #94a3b8;
  cursor: not-allowed;
}

.option-card.disabled:hover {
  border-color: #e5e7eb;
  transform: none;
}

.option-card input {
  margin-right: 8px;
}

.option-title {
  font-weight: bold;
  margin-bottom: 4px;
}

.option-sub {
  font-size: 13px;
  color: var(--sub);
}

.button-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 18px;
}

button {
  appearance: none;
  border: none;
  border-radius: 12px;
  padding: 12px 16px;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
}

.primary {
  background: var(--accent);
  color: white;
}

.secondary {
  background: #eef2f7;
  color: var(--text);
}

.ghost {
  background: white;
  border: 1px solid var(--line);
  color: var(--text);
}

.badge-button {
  position: relative;
  padding-right: 34px;
}

.count-badge {
  position: absolute;
  top: -8px;
  right: -8px;
  min-width: 24px;
  height: 24px;
  padding: 0 6px;
  border-radius: 999px;
  background: #ef4444;
  color: white;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: bold;
  line-height: 1;
  border: 2px solid white;
}

button:disabled {
  opacity: 0.45;
  cursor: not-allowed;
}

.summary {
  margin-top: 14px;
  padding: 14px;
  border-radius: 12px;
  background: #f8fbff;
  border: 1px solid var(--line);
  color: var(--sub);
  line-height: 1.7;
}

.hidden {
  display: none;
}

.study-header {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: flex-start;
  flex-wrap: wrap;
}

.badge {
  display: inline-block;
  padding: 6px 10px;
  background: var(--accent-soft);
  color: var(--accent);
  border-radius: 999px;
  font-size: 12px;
  font-weight: bold;
  margin-bottom: 10px;
}

.question-box {
  margin-top: 18px;
  padding: 20px;
  border-radius: 16px;
  background: #f9fbff;
  border: 1px solid var(--line);
}

#question {
  font-size: 24px;
  line-height: 1.6;
  margin-bottom: 16px;
}

#answer {
  width: 100%;
  padding: 14px;
  font-size: 16px;
  border-radius: 12px;
  border: 1px solid var(--line);
  margin-bottom: 12px;
}

.meta {
  margin-top: 12px;
  color: var(--sub);
  font-size: 14px;
}

#result {
  min-height: 24px;
  font-weight: bold;
  margin-top: 10px;
}

#result.ok {
  color: var(--ok);
}

#result.ng {
  color: var(--ng);
}

.footer-actions {
  margin-top: 18px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.empty {
  color: var(--sub);
  padding: 20px;
  text-align: center;
  border: 1px dashed var(--line);
  border-radius: 12px;
  background: #fcfdff;
}

@media (max-width: 640px) {
  .wrapper {
    width: calc(100% - 20px);
    margin: 10px auto 24px;
  }

  .card {
    padding: 18px;
  }

  #question {
    font-size: 20px;
  }

  button {
    width: 100%;
  }
}
</style>
</head>

<body>
<div class="wrapper">
  <div id="selectionView" class="card">
    <div class="hero">
      <h1>英単語学習</h1>
      <p>学習する日程とページ範囲を選んで、選んだ単語だけで穴埋め学習できます。</p>
    </div>

    <div class="section">
      <span class="label">1. テストの日程を選択</span>
      <div id="scheduleList" class="schedule-grid"></div>
    </div>

    <div class="section">
      <span class="label">2. 学習範囲を選択（複数選択可）</span>
      <div id="pageRangeList" class="page-grid"></div>
    </div>

    <div id="selectionSummary" class="summary">
      日程とページ範囲を選択してください。
    </div>

    <div class="button-row">
      <button id="startButton" class="primary" disabled>この範囲で学習開始</button>
      <button id="showListButton" class="secondary" disabled>選択範囲の単語一覧を見る</button>
    </div>
  </div>

  <div id="studyView" class="card hidden">
    <div class="study-header">
      <div>
        <div class="badge" id="studyTarget">選択範囲</div>
        <h2>穴埋め学習</h2>
      </div>
      <div class="meta">
        <div id="progress"></div>
        <div id="score"></div>
      </div>
    </div>

    <div class="question-box">
      <h3 id="question">Loading...</h3>
      <input type="text" id="answer" placeholder="答えを入力">
      <button class="primary" onclick="checkAnswer()">回答</button>
      <p id="result"></p>
    </div>

    <div class="footer-actions">
      <button id="hardModeButton" class="ghost badge-button" onclick="toggleMode()">
        よく間違える問題モード
        <span id="hardModeCount" class="count-badge">0</span>
      </button>
      <button class="secondary" onclick="backToSelection()">範囲選択に戻る</button>
      <button class="ghost" onclick="openSelectedList()">選択範囲の一覧を見る</button>
      <button id="restartButton" class="primary hidden" onclick="restartStudy()">はじめからもう一度学習する</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = "vocabSelectionState";

// 日程を追加するときは、この配列に1件追加するだけでよい構成です。
const schedules = [
  {
    id: "2026-04-23",
    label: "4/23 単語学習",
    dataFile: "data.txt",
    startPage: 16,
    linesPerRange: 13,
    available: true
  },
  {
    id: "2026-05-07",
    label: "5/7 単語学習",
    dataFile: "data2.txt",
    startPage: 26,
    linesPerRange: 13,
    available: false
  },
  {
    id: "2026-05-14",
    label: "5/14 単語学習",
    dataFile: "data3.txt",
    startPage: 36,
    linesPerRange: 13,
    available: false
  },
  {
    id: "2026-06-04",
    label: "6/4 単語学習",
    dataFile: "data4.txt",
    startPage: 46,
    linesPerRange: 13,
    available: false
  },
  {
    id: "2026-06-11",
    label: "6/11 単語学習",
    dataFile: "data5.txt",
    startPage: 56,
    linesPerRange: 13,
    available: false
  },
  {
    id: "2026-06-18",
    label: "6/18 単語学習",
    dataFile: "data6.txt",
    startPage: 66,
    linesPerRange: 13,
    available: false
  },
  {
    id: "2026-06-25",
    label: "6/25 単語学習",
    dataFile: "data7.txt",
    startPage: 76,
    linesPerRange: 13,
    available: false
  },
  {
    id: "2026-07-02",
    label: "7/2 単語学習",
    dataFile: "data8.txt",
    startPage: 86,
    linesPerRange: 13,
    available: false
  }
];

let scheduleWordsMap = {};
let selectedScheduleId = "";
let selectedRangeIds = [];
let selectedWords = [];

let currentList = [];
let pageRanges = [];
let index = 0;
let correct = 0;
let hardMode = false;
let isComposing = false;

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function parseData(data) {
  return data
    .trim()
    .split("\n")
    .filter(line => line.trim())
    .map((line, idx) => {
      const parts = line.split(",");
      const answer = parts.pop().trim();
      const question = parts.join(",").trim();
      return {
        id: idx,
        q: question,
        a: answer,
        wrongCount: 0,
        marked: false
      };
    });
}

function getSelectedSchedule() {
  return schedules.find(schedule => schedule.id === selectedScheduleId && schedule.available !== false) || null;
}

function buildPageRanges(schedule) {
  const words = scheduleWordsMap[schedule.id] || [];
  const ranges = [];

  for (let start = 0; start < words.length; start += schedule.linesPerRange) {
    const end = Math.min(start + schedule.linesPerRange, words.length);
    const startPage = schedule.startPage + ranges.length * 2;
    ranges.push({
      id: `${schedule.id}-range-${ranges.length + 1}`,
      label: `P${startPage}&P${startPage + 1}`,
      start,
      end
    });
  }

  return ranges;
}

function refreshPageRanges() {
  const schedule = getSelectedSchedule();
  pageRanges = schedule ? buildPageRanges(schedule) : [];
}

function renderSchedules() {
  const container = document.getElementById("scheduleList");
  container.innerHTML = "";

  schedules.forEach(schedule => {
    const words = scheduleWordsMap[schedule.id] || [];
    const rangeCount = Math.ceil(words.length / schedule.linesPerRange);
    const isSelected = selectedScheduleId === schedule.id;
    const isDisabled = schedule.available === false;
    const card = document.createElement("label");
    card.className = "option-card" + (isSelected ? " selected" : "") + (isDisabled ? " disabled" : "");
    card.innerHTML = `
      <div class="option-title">
        <input type="radio" name="schedule" value="${schedule.id}" ${isSelected ? "checked" : ""} ${isDisabled ? "disabled" : ""}>
        ${schedule.label}
      </div>
      <div class="option-sub">${isDisabled ? "準備中" : `${rangeCount} 範囲 / ${words.length} 問`}</div>
    `;

    if (isDisabled) {
      container.appendChild(card);
      return;
    }

    card.querySelector("input").addEventListener("change", () => {
      selectedScheduleId = schedule.id;
      selectedRangeIds = [];
      selectedWords = [];
      correct = 0;
      hardMode = false;
      refreshPageRanges();
      renderSchedules();
      renderPageRanges();
      saveState();
    });

    container.appendChild(card);
  });
}

function renderPageRanges() {
  refreshPageRanges();

  const container = document.getElementById("pageRangeList");
  container.innerHTML = "";

  if (!selectedScheduleId) {
    container.innerHTML = '<div class="empty">先に日程を選択してください。</div>';
    updateSelectionSummary();
    return;
  }

  pageRanges.forEach(range => {
    const checked = selectedRangeIds.includes(range.id);
    const count = range.end - range.start;
    const card = document.createElement("label");
    card.className = "option-card" + (checked ? " selected" : "");
    card.innerHTML = `
      <div class="option-title">
        <input type="checkbox" value="${range.id}" ${checked ? "checked" : ""}>
        ${range.label}
      </div>
      <div class="option-sub">${count} 問</div>
    `;

    card.querySelector("input").addEventListener("change", event => {
      if (event.target.checked) {
        selectedRangeIds.push(range.id);
      } else {
        selectedRangeIds = selectedRangeIds.filter(id => id !== range.id);
      }

      selectedWords = [];
      correct = 0;
      hardMode = false;
      renderPageRanges();
      saveState();
    });

    container.appendChild(card);
  });

  updateSelectionSummary();
}

function getSelectedRanges() {
  return pageRanges.filter(range => selectedRangeIds.includes(range.id));
}

function buildSelectedWords() {
  const schedule = getSelectedSchedule();
  const words = schedule ? scheduleWordsMap[schedule.id] || [] : [];
  const ranges = getSelectedRanges();
  const selected = [];

  ranges.forEach(range => {
    selected.push(...words.slice(range.start, range.end));
  });

  return selected.map(word => ({ ...word }));
}

function updateSelectionSummary() {
  const summary = document.getElementById("selectionSummary");
  const startButton = document.getElementById("startButton");
  const listButton = document.getElementById("showListButton");
  const schedule = getSelectedSchedule();
  const ranges = getSelectedRanges();

  if (!schedule) {
    summary.innerHTML = "日程を選択してください。";
    startButton.disabled = true;
    listButton.disabled = true;
    return;
  }

  if (!ranges.length) {
    summary.innerHTML = `${schedule.label} を選択中です。続けて学習範囲を選んでください。`;
    startButton.disabled = true;
    listButton.disabled = true;
    return;
  }

  const count = ranges.reduce((sum, range) => sum + (range.end - range.start), 0);
  summary.innerHTML = `
    <strong>${schedule.label}</strong><br>
    データ: ${schedule.dataFile}<br>
    範囲: ${ranges.map(range => range.label).join(", ")}<br>
    出題数: ${count} 問
  `;
  startButton.disabled = false;
  listButton.disabled = false;
}

function rebuildList() {
  if (hardMode) {
    currentList = selectedWords.filter(word => word.wrongCount >= 3);
  } else {
    currentList = [...selectedWords];
  }

  shuffle(currentList);
  index = 0;
}

function updateHardModeCount() {
  const count = selectedWords.filter(word => word.wrongCount >= 3).length;
  const badge = document.getElementById("hardModeCount");
  badge.innerText = count;
  badge.classList.toggle("hidden", count === 0);
}

function showQuestion() {
  const questionEl = document.getElementById("question");
  const resultEl = document.getElementById("result");
  const answerInput = document.getElementById("answer");
  const submitButton = document.querySelector(".question-box .primary");
  const restartButton = document.getElementById("restartButton");

  restartButton.classList.add("hidden");

  if (!currentList.length) {
    questionEl.innerText = hardMode ? "よく間違えた問題がまだありません" : "問題がありません";
    document.getElementById("progress").innerText = "0 / 0";
    document.getElementById("score").innerText = `正解数: ${correct}`;
    resultEl.innerText = "";
    resultEl.className = "";
    answerInput.value = "";
    answerInput.disabled = true;
    submitButton.disabled = true;
    return;
  }

  if (index >= currentList.length) {
    questionEl.innerText = "終了！";
    document.getElementById("progress").innerText = `${currentList.length} / ${currentList.length}`;
    document.getElementById("score").innerText = `正解数: ${correct}`;
    resultEl.innerText = "同じ範囲でもう一度学習できます。";
    resultEl.className = "ok";
    answerInput.value = "";
    answerInput.disabled = true;
    submitButton.disabled = true;
    restartButton.classList.remove("hidden");
    return;
  }

  questionEl.innerText = currentList[index].q;
  answerInput.disabled = false;
  submitButton.disabled = false;
  answerInput.value = "";
  answerInput.focus();
  document.getElementById("progress").innerText = `${index + 1} / ${currentList.length}`;
  document.getElementById("score").innerText = `正解数: ${correct}`;
  resultEl.innerText = "";
  resultEl.className = "";
}

function syncCurrentToSelected(current) {
  const original = selectedWords.find(word => word.id === current.id);
  if (original) {
    original.marked = current.marked;
    original.wrongCount = current.wrongCount;
  }
}

function checkAnswer() {
  const input = document.getElementById("answer").value.trim();
  const result = document.getElementById("result");
  const current = currentList[index];

  if (!current) return;

  if (input === current.a) {
    result.innerText = "正解！";
    result.className = "ok";
    correct++;
    current.marked = false;
    if (hardMode && current.wrongCount >= 3) {
      current.wrongCount = 0;
    }
    syncCurrentToSelected(current);
    index++;
  } else {
    result.innerText = `不正解: ${current.a}`;
    result.className = "ng";
    current.marked = true;
    current.wrongCount++;
    syncCurrentToSelected(current);
  }

  updateHardModeCount();
  saveState();
  setTimeout(showQuestion, 800);
}

function toggleMode() {
  hardMode = !hardMode;
  document.getElementById("result").innerText = hardMode ? "よく間違える問題モード" : "通常モード";
  document.getElementById("result").className = hardMode ? "ok" : "";
  rebuildList();
  showQuestion();
  saveState();
}

function startStudy() {
  selectedWords = buildSelectedWords();
  if (!selectedWords.length) return;

  shuffle(selectedWords);
  correct = 0;
  index = 0;
  hardMode = false;

  const schedule = getSelectedSchedule();
  const ranges = getSelectedRanges();
  document.getElementById("studyTarget").innerText = `${schedule.label} / ${ranges.map(range => range.label).join(", ")}`;

  rebuildList();
  updateHardModeCount();
  document.getElementById("selectionView").classList.add("hidden");
  document.getElementById("studyView").classList.remove("hidden");
  saveState();
  showQuestion();
}

function restartStudy() {
  if (!selectedWords.length) return;

  correct = 0;
  index = 0;
  hardMode = false;
  rebuildList();
  updateHardModeCount();
  saveState();
  showQuestion();
}

function backToSelection() {
  document.getElementById("studyView").classList.add("hidden");
  document.getElementById("selectionView").classList.remove("hidden");
  selectedWords = [];
  currentList = [];
  correct = 0;
  index = 0;
  hardMode = false;
  updateHardModeCount();
  saveState();
}

function openSelectedList() {
  const params = new URLSearchParams();
  params.set("schedule", selectedScheduleId);
  params.set("ranges", selectedRangeIds.join("|"));
  location.href = `list.html?${params.toString()}`;
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    selectedScheduleId,
    selectedRangeIds,
    selectedWords,
    correct,
    hardMode,
    studyOpened: !document.getElementById("studyView").classList.contains("hidden")
  }));
}

function loadState() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
  } catch {
    return {};
  }
}

function restoreState() {
  const state = loadState();
  selectedScheduleId = state.selectedScheduleId || "";
  selectedRangeIds = Array.isArray(state.selectedRangeIds) ? state.selectedRangeIds : [];
  refreshPageRanges();

  if (Array.isArray(state.selectedWords) && state.selectedWords.length) {
    selectedWords = state.selectedWords;
    correct = state.correct || 0;
    hardMode = !!state.hardMode;
    updateHardModeCount();

    const schedule = getSelectedSchedule();
    const ranges = getSelectedRanges();

    if (schedule && ranges.length && state.studyOpened) {
      document.getElementById("studyTarget").innerText = `${schedule.label} / ${ranges.map(range => range.label).join(", ")}`;
      document.getElementById("selectionView").classList.add("hidden");
      document.getElementById("studyView").classList.remove("hidden");
      rebuildList();
      showQuestion();
    }
  }
}

async function loadAllSchedules() {
  const loads = schedules.map(async schedule => {
    const response = await fetch(`${schedule.dataFile}?v=${Date.now()}`);
    const text = await response.text();
    scheduleWordsMap[schedule.id] = parseData(text);
  });

  await Promise.all(loads);
}

document.getElementById("startButton").addEventListener("click", startStudy);
document.getElementById("showListButton").addEventListener("click", openSelectedList);
document.getElementById("answer").addEventListener("compositionstart", () => {
  isComposing = true;
});
document.getElementById("answer").addEventListener("compositionend", () => {
  isComposing = false;
});
document.getElementById("answer").addEventListener("keydown", event => {
  if (event.key !== "Enter") return;
  if (isComposing || event.isComposing || event.keyCode === 229) return;
  checkAnswer();
});

loadAllSchedules().then(() => {
  restoreState();
  renderSchedules();
  renderPageRanges();
  updateSelectionSummary();
  updateHardModeCount();
});
</script>
</body>
</html>
