<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英単語学習アプリ</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f5f5f5;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  width: 90%;
  max-width: 400px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  text-align: center;
}

h2 {
  margin-bottom: 20px;
}

input {
  width: 93%;
  padding: 12px;
  font-size: 16px;
  margin-bottom: 10px;
  align-items: center;
  text-align: center;
}

button {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  margin-top: 5px;
  cursor: pointer;
}

#result {
  margin-top: 10px;
  font-weight: bold;
}

.small {
  font-size: 14px;
  color: gray;
}

.toggle {
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="card">
  <h2 id="question">Loading...</h2>

  <input type="text" id="answer" placeholder="答えを入力">

  <button onclick="checkAnswer()">回答</button>

  <p id="result"></p>

  <p class="small" id="progress"></p>
  <p class="small" id="score"></p>

  <button class="toggle" onclick="toggleMode()">よく間違える問題モード</button>
</div>

<script>
  // ==============================
  // Fisher-Yates シャッフル（確実にランダム化）
  // ==============================
  function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
  }
  
  // ==============================
  // データ読み込み
  // ==============================
  let words = [];
  let currentList = [];
  
  fetch("data.txt")
    .then(res => res.text())
    .then(text => {
      words = parseData(text);
  
      // 🔥 毎回確実にシャッフル
      shuffle(words);
  
      // LocalStorage復元（←ここで上書きするとランダムが死ぬので順序注意）
      const saved = JSON.parse(localStorage.getItem("progress"));
      if (saved) {
        words = saved.words;
        correct = saved.correct;
      }
  
      rebuildList();
      showQuestion();
    });
  
  // ==============================
  // データパース
  // ==============================
  function parseData(data) {
    return data.trim().split("\n").map(line => {
      const [q, a] = line.split(",");
      return {
        q: q.trim(),
        a: a.trim(),
        wrongCount: 0,
        marked: false
      };
    });
  }
  
  // ==============================
  // 状態管理
  // ==============================
  let index = 0;
  let correct = 0;
  let hardMode = false;
  
  // ==============================
  // 出題リスト再構築（ここが重要）
  // ==============================
  function rebuildList() {
    if (hardMode) {
      currentList = words.filter(w => w.wrongCount >= 3);
    } else {
      currentList = [...words]; // コピー
    }
  
    // 🔥 出題リストを毎回シャッフル（これが本質）
    shuffle(currentList);
  
    index = 0;
  }
  
  // ==============================
  // 表示処理
  // ==============================
  function showQuestion() {
    if (!currentList.length) {
      document.getElementById("question").innerText = "問題がありません";
      return;
    }
  
    if (index >= currentList.length) {
      document.getElementById("question").innerText = "終了！";
      return;
    }
  
    document.getElementById("question").innerText = currentList[index].q;
    document.getElementById("answer").value = "";
    document.getElementById("answer").focus();
  
    document.getElementById("progress").innerText =
      `${index + 1} / ${currentList.length}`;
  
    document.getElementById("score").innerText =
      `正解数: ${correct}`;
  }
  
  // ==============================
  // 判定処理
  // ==============================
  function checkAnswer() {
    const input = document.getElementById("answer").value.trim();
    const result = document.getElementById("result");
  
    const current = currentList[index];
    if (!current) return;
  
    if (input === current.a) {
      result.innerText = "正解！";
      correct++;
      current.marked = false;
      index++;
    } else {
      result.innerText = `不正解：${current.a}`;
      current.marked = true;
      current.wrongCount++;
    }
  
    saveProgress();
    setTimeout(showQuestion, 800);
  }
  
  // ==============================
  // モード切替
  // ==============================
  function toggleMode() {
    hardMode = !hardMode;
  
    document.getElementById("result").innerText =
      hardMode ? "よく間違える問題モード" : "通常モード";
  
    rebuildList(); // 🔥 切替時に再シャッフル
    showQuestion();
  }
  
  // ==============================
  // 保存処理
  // ==============================
  function saveProgress() {
    localStorage.setItem("progress", JSON.stringify({
      words: words,
      correct: correct
    }));
  }
  
  // ==============================
  // Enterキー対応
  // ==============================
  document.getElementById("answer").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
      checkAnswer();
    }
  });
  
</script>
</body>
</html>
