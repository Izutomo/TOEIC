<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>単語一覧</title>

<style>
:root {
  --card: #ffffff;
  --line: #d9e2f1;
  --text: #223042;
  --sub: #617389;
  --accent: #2f6fed;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: sans-serif;
  background: linear-gradient(180deg, #eef4ff 0%, #f8fafc 100%);
  color: var(--text);
  padding: 20px;
}

.container {
  max-width: 760px;
  margin: auto;
}

.panel {
  background: var(--card);
  border-radius: 18px;
  padding: 20px;
  box-shadow: 0 12px 30px rgba(31, 41, 55, 0.08);
  border: 1px solid rgba(217, 226, 241, 0.9);
  margin-bottom: 16px;
}

h1, p {
  margin-top: 0;
}

.subtext {
  color: var(--sub);
  line-height: 1.7;
}

button {
  appearance: none;
  border: none;
  border-radius: 12px;
  padding: 12px 16px;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
  background: var(--accent);
  color: white;
}

.word-card {
  background: white;
  padding: 18px;
  margin-bottom: 12px;
  border-radius: 14px;
  border: 1px solid var(--line);
}

.word-head {
  display: grid;
  grid-template-columns: 56px 1fr;
  gap: 14px;
  align-items: start;
}

.word-no {
  color: var(--sub);
  font-size: 13px;
  font-weight: bold;
  letter-spacing: 0.04em;
}

.word {
  font-weight: bold;
  font-size: 22px;
  line-height: 1.3;
}

.translation {
  font-size: 15px;
  line-height: 1.6;
  color: var(--text);
  font-weight: bold;
}

.sentence {
  color: #4b5b6b;
  line-height: 1.6;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px dashed var(--line);
}

.translation {
  margin-top: 10px;
  color: var(--text);
  line-height: 1.7;
  font-weight: bold;
}

.empty {
  text-align: center;
  color: var(--sub);
  padding: 24px;
}

@media (max-width: 640px) {
  .word-head {
    grid-template-columns: 1fr;
    gap: 8px;
  }
}
</style>
</head>
<body>
<div class="container">
  <div class="panel">
    <h1 id="title">単語一覧</h1>
    <p id="summary" class="subtext">読み込み中...</p>
    <button onclick="location.href='index.html'">戻る</button>
  </div>

  <div id="list"></div>
</div>

<script>
const STORAGE_KEY = "vocabSelectionState";

const schedules = [
  {
    id: "2026-04-23",
    label: "4/23 単語学習",
    dataFile: "data.txt",
    startPage: 16,
    linesPerRange: 13,
    available: true
  },
  {
    id: "2026-05-07",
    label: "5/7 単語学習",
    dataFile: "data2.txt",
    startPage: 26,
    linesPerRange: 13,
    available: false
  },
  {
    id: "2026-05-14",
    label: "5/14 単語学習",
    dataFile: "data3.txt",
    startPage: 36,
    linesPerRange: 13,
    available: false
  },
  {
    id: "2026-06-04",
    label: "6/4 単語学習",
    dataFile: "data4.txt",
    startPage: 46,
    linesPerRange: 13,
    available: false
  },
  {
    id: "2026-06-11",
    label: "6/11 単語学習",
    dataFile: "data5.txt",
    startPage: 56,
    linesPerRange: 13,
    available: false
  },
  {
    id: "2026-06-18",
    label: "6/18 単語学習",
    dataFile: "data6.txt",
    startPage: 66,
    linesPerRange: 13,
    available: false
  },
  {
    id: "2026-06-25",
    label: "6/25 単語学習",
    dataFile: "data7.txt",
    startPage: 76,
    linesPerRange: 13,
    available: false
  },
  {
    id: "2026-07-02",
    label: "7/2 単語学習",
    dataFile: "data8.txt",
    startPage: 86,
    linesPerRange: 13,
    available: false
  }
];

function parseData(data) {
  return data
    .trim()
    .split("\n")
    .filter(line => line.trim())
    .map((line, idx) => {
      let question = "";
      let answer = "";
      let translation = "";
      const tripleMatch = line.match(/^(.*),\s*([^,]+),\s*([^,]+)$/);
      const doubleMatch = line.match(/^(.*),\s*([^,]+)$/);

      if (tripleMatch && /[ぁ-んァ-ン一-龠]/.test(tripleMatch[3])) {
        question = tripleMatch[1].trim();
        answer = tripleMatch[2].trim();
        translation = tripleMatch[3].trim();
      } else if (doubleMatch) {
        question = doubleMatch[1].trim();
        answer = doubleMatch[2].trim();
      } else {
        question = line.trim();
      }

      return { id: idx, q: question, a: answer, jp: translation };
    });
}

function buildPageRanges(schedule, words) {
  const ranges = [];

  for (let start = 0; start < words.length; start += schedule.linesPerRange) {
    const end = Math.min(start + schedule.linesPerRange, words.length);
    const startPage = schedule.startPage + ranges.length * 2;
    ranges.push({
      id: `${schedule.id}-range-${ranges.length + 1}`,
      label: `P${startPage}&P${startPage + 1}`,
      start,
      end
    });
  }

  return ranges;
}

function loadSelectionFromQueryOrStorage() {
  const params = new URLSearchParams(location.search);
  const fromQuerySchedule = params.get("schedule");
  const fromQueryRanges = params.get("ranges");

  if (fromQuerySchedule && fromQueryRanges) {
    return {
      scheduleId: fromQuerySchedule,
      rangeIds: fromQueryRanges.split("|").filter(Boolean)
    };
  }

  try {
    const state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
    return {
      scheduleId: state.selectedScheduleId || "",
      rangeIds: Array.isArray(state.selectedRangeIds) ? state.selectedRangeIds : []
    };
  } catch {
    return { scheduleId: "", rangeIds: [] };
  }
}

async function renderList() {
  const selection = loadSelectionFromQueryOrStorage();
  const schedule = schedules.find(item => item.id === selection.scheduleId);

  const title = document.getElementById("title");
  const summary = document.getElementById("summary");
  const container = document.getElementById("list");

  if (!schedule) {
    title.innerText = "単語一覧";
    summary.innerText = "範囲が選択されていません。ホーム画面で日程とページ範囲を選んでください。";
    container.innerHTML = '<div class="panel empty">表示できる単語がありません。</div>';
    return;
  }

  if (schedule.available === false) {
    title.innerText = `${schedule.label} の単語一覧`;
    summary.innerText = "この日程はまだ準備中です。公開されるまで表示できません。";
    container.innerHTML = '<div class="panel empty">まだ表示できる単語がありません。</div>';
    return;
  }

  const response = await fetch(`${schedule.dataFile}?v=${Date.now()}`);
  const text = await response.text();
  const words = parseData(text);
  const pageRanges = buildPageRanges(schedule, words);
  const ranges = pageRanges.filter(range => selection.rangeIds.includes(range.id));

  if (!ranges.length) {
    title.innerText = `${schedule.label} の単語一覧`;
    summary.innerText = "ページ範囲が選択されていません。ホーム画面で範囲を選んでください。";
    container.innerHTML = '<div class="panel empty">表示できる単語がありません。</div>';
    return;
  }

  title.innerText = `${schedule.label} の単語一覧`;
  summary.innerText = `表示範囲: ${ranges.map(range => range.label).join(", ")} / データ: ${schedule.dataFile}`;

  const selectedWords = [];
  ranges.forEach(range => {
    selectedWords.push(...words.slice(range.start, range.end));
  });

  selectedWords.forEach(word => {
    const div = document.createElement("div");
    div.className = "word-card";
    div.innerHTML = `
      <div class="word-head">
        <div class="word-no">No.${word.id + 1}</div>
        <div class="word">${word.a}</div>
      </div>
      <div class="sentence">${word.q}</div>
      <div class="translation">${word.jp || ""}</div>
    `;
    container.appendChild(div);
  });
}

renderList();
</script>
</body>
</html>
